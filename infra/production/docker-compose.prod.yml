name: medhelp-production

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '$${REDIS_PASSWORD}' ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks: [internal]

  api:
    build:
      context: ../../services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ${APP_ENV_FILE:-.env.production}
    environment:
      ENV: production
      AUTO_CREATE_TABLES: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CORS_ORIGINS: ${PUBLIC_ORIGIN}
      WORKERS: "1"
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      RAG_RERANKER_ENABLED: "false"
      CONCURRENCY_MAX_CONCURRENT_REQUESTS: "12"
      CONCURRENCY_MAX_CONCURRENT_LLM_CALLS: "4"
      CONCURRENCY_RAG_THREAD_POOL_SIZE: "2"
    volumes:
      - uploads_data:/app/uploads
      - chroma_data:/app/data/chroma_db
      - model_cache:/home/apiuser/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 5
    networks: [internal, public]

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /backend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /backend
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    networks: [internal, public]

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    entrypoint: ["/bin/sh", "/scripts/postgres-backup.sh"]
    volumes:
      - ./postgres-backup.sh:/scripts/postgres-backup.sh:ro
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

networks:
  internal:
    internal: true
  public:

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  chroma_data:
  model_cache:
  caddy_data:
  caddy_config:
