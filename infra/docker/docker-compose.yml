services:
  postgres:
    image: postgres:16-alpine
    container_name: med_postgres
    environment:
      POSTGRES_DB: medhelpagent
      POSTGRES_USER: medhelp
      POSTGRES_PASSWORD: medhelp_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medhelp -d medhelpagent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: med_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../../services/api
      dockerfile: Dockerfile
    container_name: med_api
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://medhelp:medhelp_secret@postgres:5432/medhelpagent
      REDIS_URL: redis://redis:6379/0
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://token-plan-cn.xiaomimimo.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-mimo-v2-omni}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      CORS_ORIGINS: "http://localhost:3001,http://localhost:3000"
      ENV: development
      AUTH_SECRET: ${AUTH_SECRET:-dev-auth-secret-change-me}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev-webhook-secret-change-me}
      FEISHU_ALERT_ENABLED: ${FEISHU_ALERT_ENABLED:-false}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      FEISHU_WEBHOOK_SECRET: ${FEISHU_WEBHOOK_SECRET:-}
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-Asia/Shanghai}
      SCHEDULED_TASK_POLL_SECONDS: ${SCHEDULED_TASK_POLL_SECONDS:-30}
      CONCURRENCY_ENABLED: ${CONCURRENCY_ENABLED:-true}
      CONCURRENCY_MAX_CONCURRENT_REQUESTS: ${CONCURRENCY_MAX_CONCURRENT_REQUESTS:-30}
      CONCURRENCY_MAX_CONCURRENT_LLM_CALLS: ${CONCURRENCY_MAX_CONCURRENT_LLM_CALLS:-15}
      CONCURRENCY_RAG_THREAD_POOL_SIZE: ${CONCURRENCY_RAG_THREAD_POOL_SIZE:-8}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-BAAI/bge-large-zh-v1.5}
      RAG_RERANKER_ENABLED: ${RAG_RERANKER_ENABLED:-false}
      RAG_RERANKER_MODEL: ${RAG_RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      RAG_RERANKER_TOP_K: ${RAG_RERANKER_TOP_K:-3}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../services/api:/app
      - chroma_cache:/home/apiuser/.cache/chroma
      - ../../services/api/models:/home/apiuser/.cache/huggingface/hub
      - ../../tmp:/app/tmp
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8001
    container_name: med_web
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  chroma_cache:
